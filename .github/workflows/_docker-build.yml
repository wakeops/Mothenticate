name: Build a docker image and push to a registry

on:
  workflow_call:
    inputs:
      image_name:
        description: Comma-separated image names
        required: true
        type: string
      registry_dockerhub:
        description: Should deploy to Docker Hub
        default: false
        type: boolean
      registry_ghcr:
        description: Should deploy to GitHub Container Registry
        default: false
        type: boolean
      release:
        description: Is a release build?
        default: false
        type: boolean
      dev:
        description: Is a dev branch build?
        default: false
        type: boolean
    outputs:
      image-digest:
        value: ${{ jobs.build.outputs.image-digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ inputs.registry_dockerhub }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.registry_ghcr }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image list
        id: images
        shell: bash
        run: |
          {
            echo "list<<EOF"
            echo "${{ inputs.image_name }}" | tr ',' '\n'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # Primary image for attestation (first in list)
          IFS=',' read -ra IMGS <<< "${{ inputs.image_name }}"
          echo "primary=${IMGS[0]// /}" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ inputs.release }}
            type=sha,prefix=dev-,format=short,enable=${{ inputs.dev }}
            type=raw,value=dev-latest,enable=${{ inputs.dev }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

      - name: Attest GHCR image
        if: ${{ inputs.registry_ghcr }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.images.outputs.primary }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
