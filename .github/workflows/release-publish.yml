name: Release - Publish

on:
  release:
    types: [published, created]

jobs:
  publish:
    uses: ./.github/workflows/_docker-build.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    with:
      image_name: "ghcr.io/wakeops/mothenticate,mothenticate/mothenticate"
      release: true
      registry_ghcr: true
      registry_dockerhub: true
