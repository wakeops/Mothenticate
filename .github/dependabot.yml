version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci:"
    labels:
      - dependencies

  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps:"
    labels:
      - dependencies
    groups:
      microsoft-aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
      microsoft-entityframeworkcore:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      openiddict:
        patterns:
          - "OpenIddict.*"
      serilog:
        patterns:
          - "Serilog*"

  - package-ecosystem: npm
    directory: "/src/Mothenticate.Web"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps:"
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps:"
    labels:
      - dependencies
